<?xml version="1.0" encoding="UTF-8"?>
<!--
  Talent ゲームロゴ mock v9 (= 2026-05-25 v8 fb 後の修正版)。
  v8 → v9 差分:
    - ChatteLapin = y=20 → y=35 (= ほんの少しだけ下げて円中央に近づける)
    - basRelief colorMatrix = 黒々 → 暖色気味 (= 赤茶 sepia tone)
    - 多言語 = v7 の deboss filter 復活、 ただし lighting を控えめ (= surfaceScale 1.5)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="goldFace" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f0d472"/>
      <stop offset="45%" stop-color="#c69b18"/>
      <stop offset="85%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#6a4a08"/>
    </radialGradient>
    <radialGradient id="goldEdge" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#6b3a14"/>
      <stop offset="95%" stop-color="#5a2a0e"/>
      <stop offset="100%" stop-color="#4a200a"/>
    </radialGradient>

    <linearGradient id="glyphMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8e08a"/>
      <stop offset="35%" stop-color="#d4a02a"/>
      <stop offset="70%" stop-color="#8b6914"/>
      <stop offset="100%" stop-color="#5b3f10"/>
    </linearGradient>

    <!-- Ŧ 本体 radial gradient (= 中心ベージュ明色 → 縁暗、 「本体は金色ベージュ・縁は深 amber」
         で deboss の影と整合、 v14 ユーザー fb 反映) -->
    <radialGradient id="glyphMetalBody" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5d672"/>
      <stop offset="55%" stop-color="#d4a02a"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </radialGradient>

    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feComposite in="offsetBlur" in2="SourceAlpha" operator="arithmetic"
                   k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#5a2a0e" flood-opacity="0.55"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>

    <!-- ChatteLapin basRelief = v6 のガリガリ彫り風 (= displacement scale 6 + morphology
         erode + contrast 強化) を維持しつつ、 v9 の暖色 colorMatrix (= 赤茶 sepia tone)
         を合体 (= 暖かい色味のガリガリ刻印) -->
    <filter id="basRelief" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" result="displaced"/>
      <feMorphology in="displaced" operator="erode" radius="0.5" result="eroded"/>
      <feColorMatrix in="eroded" type="matrix"
        values="0.42 0.30 0.12 0 0.06
                0.28 0.20 0.08 0 0.03
                0.14 0.10 0.04 0 0.01
                0 0 0 1.1 0" result="warmSepia"/>
      <feComponentTransfer in="warmSepia">
        <feFuncA type="linear" slope="1.2" intercept="-0.05"/>
      </feComponentTransfer>
    </filter>

    <!-- Ŧ deboss filter (= コイン平面に凹刻された感、 surfaceScale 負数 で凹み lighting)
         + turbulence で軽い表面凹凸も加えて「打刻された金属凹み」 風 -->
    <filter id="glyphDeboss" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" result="displaced"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" result="alphaBlur"/>
      <feSpecularLighting in="alphaBlur" surfaceScale="-4" specularConstant="0.85"
                          specularExponent="22" lighting-color="#ffffff" result="spec">
        <feDistantLight azimuth="135" elevation="55"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specMasked"/>
      <feMerge>
        <feMergeNode in="displaced"/>
        <feMergeNode in="specMasked"/>
      </feMerge>
    </filter>

    <!-- BG 紙の繊維質感 (= turbulence で細かい noise を低 alpha で重畳、 サラサラゴワゴワ感) -->
    <!-- BG 紙の繊維質感 (= alpha 0.12 → 0.28 強化、 baseFrequency 1.5 で繊維感の粒度を粗く) -->
    <filter id="paperGrain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="2" seed="3" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.30
                0 0 0 0 0.20
                0 0 0 0 0.10
                0 0 0 0.28 0"/>
    </filter>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- 多言語 deboss filter (= v7 復活、 lighting 控えめ surfaceScale 1.5) -->
    <filter id="textDeboss" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="1.5" specularConstant="0.45"
                          specularExponent="30" lighting-color="#ffffff" result="spec">
        <feDistantLight azimuth="225" elevation="55"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specMasked"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="specMasked"/>
      </feMerge>
    </filter>

    <clipPath id="coinFaceClip">
      <circle cx="250" cy="250" r="215"/>
    </clipPath>
  </defs>

  <!-- BG = solid 紙色 (= v11 状態に戻し、 paperGrain 不採用) -->
  <rect x="0" y="0" width="1500" height="500" fill="#fdf6ec"/>

  <!-- 多言語 20 語 (= deboss 控えめ、 v7 のもう少し控えめ版) -->
  <g fill="#e8dcb8" stroke="#ccbe98" stroke-width="0.4" font-family="serif" filter="url(#textDeboss)" opacity="0.92">
    <text x="60"   y="50"  font-size="30" transform="rotate(-12 60 50)">Talent</text>
    <text x="280"  y="35"  font-size="28" transform="rotate(7 280 35)">талант</text>
    <text x="500"  y="55"  font-size="32" transform="rotate(-8 500 55)">才能</text>
    <text x="720"  y="38"  font-size="26" transform="rotate(14 720 38)">talento</text>
    <text x="930"  y="50"  font-size="30" transform="rotate(-5 930 50)">재능</text>
    <text x="1150" y="42"  font-size="28"
          font-family="'Shippori Mincho B1', 'Noto Serif CJK JP', serif"
          transform="rotate(11 1150 42)">タレント</text>
    <text x="1340" y="60"  font-size="26" transform="rotate(-18 1340 60)">don</text>

    <text x="60"   y="465" font-size="28" transform="rotate(8 60 465)">موهبة</text>
    <text x="240"  y="455" font-size="32" transform="rotate(-10 240 455)">yetenek</text>
    <text x="470"  y="470" font-size="26" transform="rotate(15 470 470)">प्रतिभा</text>
    <text x="680"  y="455" font-size="30" transform="rotate(-7 680 455)">bakat</text>
    <text x="880"  y="475" font-size="28" transform="rotate(13 880 475)">tài năng</text>
    <text x="1080" y="460" font-size="26" transform="rotate(-16 1080 460)">พรสวรรค์</text>
    <text x="1280" y="450" font-size="30" transform="rotate(9 1280 450)">כישרון</text>

    <text x="977"  y="395" font-size="22" transform="rotate(-10 977 395)">kipaji</text>
    <text x="540"  y="380" font-size="22" transform="rotate(10 540 380)">lahja</text>
    <text x="1240" y="180" font-size="24" transform="rotate(-8 1240 180)">tehetség</text>
    <text x="1240" y="360" font-size="24" transform="rotate(12 1240 360)">nadanie</text>
    <text x="50"   y="260" font-size="22" transform="rotate(-22 50 260)">ταλέντο</text>
    <text x="1410" y="270" font-size="22"
          font-family="'Shippori Mincho B1', 'Noto Serif CJK JP', serif"
          transform="rotate(18 1410 270)">天賦</text>
  </g>

  <!-- ===== 金貨 ===== -->
  <g filter="url(#dropShadow)">
    <circle cx="250" cy="250" r="225" fill="url(#goldEdge)"/>
    <circle cx="250" cy="250" r="218" fill="none" stroke="#5a2a0e" stroke-width="1.5"/>
    <circle cx="250" cy="250" r="215" fill="url(#goldFace)" filter="url(#innerShadow)"/>
    <circle cx="250" cy="250" r="195" fill="none" stroke="rgba(107, 58, 20, 0.45)" stroke-width="1"/>

    <g fill="rgba(107, 58, 20, 0.70)">
      <circle cx="445" cy="250"   r="2.5"/>
      <circle cx="438.4" cy="299.7" r="2.5"/>
      <circle cx="418.9" cy="345.8" r="2.5"/>
      <circle cx="387.9" cy="385.4" r="2.5"/>
      <circle cx="347.3" cy="416.4" r="2.5"/>
      <circle cx="299.7" cy="438.4" r="2.5"/>
      <circle cx="250"   cy="445"   r="2.5"/>
      <circle cx="200.3" cy="438.4" r="2.5"/>
      <circle cx="152.7" cy="416.4" r="2.5"/>
      <circle cx="112.1" cy="385.4" r="2.5"/>
      <circle cx="81.1"  cy="345.8" r="2.5"/>
      <circle cx="61.6"  cy="299.7" r="2.5"/>
      <circle cx="55"    cy="250"   r="2.5"/>
      <circle cx="61.6"  cy="200.3" r="2.5"/>
      <circle cx="81.1"  cy="154.2" r="2.5"/>
      <circle cx="112.1" cy="114.6" r="2.5"/>
      <circle cx="152.7" cy="83.6"  r="2.5"/>
      <circle cx="200.3" cy="61.6"  r="2.5"/>
      <circle cx="250"   cy="55"    r="2.5"/>
      <circle cx="299.7" cy="61.6"  r="2.5"/>
      <circle cx="347.3" cy="83.6"  r="2.5"/>
      <circle cx="387.9" cy="114.6" r="2.5"/>
      <circle cx="418.9" cy="154.2" r="2.5"/>
      <circle cx="438.4" cy="200.3" r="2.5"/>
    </g>

    <!-- ChatteLapin body v2 (= 顔右ヒゲ根本の白残り fix の再加工版、 fuzz 22% + 多色 transparent) -->
    <g clip-path="url(#coinFaceClip)">
      <image href="chattelapin-body.png" x="-10" y="35" width="520" height="520"
             filter="url(#basRelief)" preserveAspectRatio="xMidYMid slice"
             opacity="0.88"/>
    </g>

    <!-- 上部反射楕円 削除 (= v11 ユーザー fb: 「平面コインに球体反射光は不整合」) -->

    <!-- Ŧ deboss + 本体 radial gradient (= 中心ベージュ明 → 縁暗、 ベージュ本体の金色感) +
         glyphDeboss filter 内の turbulence displacement で ザラザラ感 -->
    <text x="250" y="358"
          text-anchor="middle"
          font-family="'Shippori Mincho B1', 'Noto Serif CJK JP', 'Hiragino Mincho ProN', serif"
          font-size="320" font-weight="700"
          fill="url(#glyphMetalBody)"
          filter="url(#glyphDeboss)">Ŧ</text>

    <circle cx="250" cy="250" r="225" fill="none"
            stroke="rgba(255,235,180,0.30)" stroke-width="1.5"/>
  </g>

  <text x="540" y="320" fill="#5b3f10"
        font-family="'Shippori Mincho B1', 'Noto Serif CJK JP', 'Hiragino Mincho ProN', serif"
        font-size="200" font-weight="700" letter-spacing="6">Talent</text>
</svg>
