    trade_value: "Software Studio"
    domicile_label: "Domicile"
    domicile_value: "Atami, JP"
  logo_alt: "ChatteLapin logo. A watercolor figure of a cat-like rabbit, with hand-lettered Chatte Lapin"
  figure:
    num: "Fig. 01"
    desc: "Logotype — ChatteLapin"
  scroll_label: "Scroll"
  scroll_aria: "To the next section"

