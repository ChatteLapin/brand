      name: "business"
      tagline: "An AI-driven accounting automation platform built on the freee API and Claude Vision. An internal mechanism designed to minimize the operational hours of running a business, so that time can be concentrated on the flagship."
      badge: "Operating base"
    brand:
      name: "brand"
      tagline: "A public brand and communications foundation that consolidates the logo, guidelines, official site source, and future printed materials. The source of truth for a brand experience that does not waver between print and screen."
      badge: "Public brand"

products_business:
  layout:
    title: "business — AI accounting automation"
    description: "An accounting automation platform built on the freee API and Claude Vision. ChatteLapin's internal operating foundation that reweaves paper receipts and ledgers into the digital, through AI."
  breadcrumb_label: "Products"
  header:
    eyebrow: "Operating base"
    title: "business"
    tagline: "AI-driven accounting automation — an operating foundation."
    meta:
      field_label: "Field"
      field_value: "freee × Claude Vision"
      status_label: "Status"
      status_value: "Phase 0 completed (2026-05-21)"
      policy_label: "Policy"
      policy_value: "Developed with OSS publication in mind"
  position:
    num: "§ 01"
    marginalia: "Position"
    title: "Positioning."
    paragraph_1: 'business is ChatteLapin''s <strong>operating foundation</strong>. It is not sold as a product; it is a mechanism to minimize the operational hours of running the business. It implements the mission "Place a quiet hour between technology and the analog" in the realm of accounting — perhaps the one that most aggressively steals time and attention.'
    paragraph_2: 'The motivation for choosing sole proprietorship was itself "much of accounting looks automatable with AI." By building the automation foundation in-house, the proprietor''s own time is redirected toward product development and creative work.'
    paragraph_3: 'With future open-sourcing in mind, the project is maintained as an implementation record that can serve as a reference for sole proprietors and developers in a similar position.'
  pipeline:
    num: "§ 02"
    marginalia: "Pipeline"
    title: "Three-layer pipeline."
    layers:
      - num: "01"
        title: "Automatic ingestion from banks / cards"
        text: 'Transactions from the trade-name bank account and various cards are pulled in via freee''s auto-sync; a rules engine maps each description to an account item. A confidence threshold splits "auto-confirm" from "awaits review".'
      - num: "02"
        title: "Reweaving paper receipts with AI"
        text: "Paper receipts photographed on a smartphone arrive via Discord → Claude Vision (= a multimodal LLM) performs OCR and account-item inference in a single shot → the freee API registers the journal entry and attaches the image (= compliant with Japan's e-Document Preservation Act). The certainty of analog paper is bridged into the digital ledger."
      - num: "03"
        title: "Monthly automatic checks / reports"
        text: "Balance reconciliation, anomaly detection, automatic generation and delivery of a monthly P&L PDF. A tax-saving scheme simulation is also integrated, minimizing the aggregation cost at tax-filing time."
  progress:
    num: "§ 03"
    marginalia: "Progress"
    title: "Development status."
    paragraph_1: '<strong>Phase 0 scaffolding was completed on 2026-05-21.</strong> App registration on the freee developer portal, implementation of the OAuth 2.0 authorization flow, and a working connection to the transactions API have all been reached.'
    paragraph_2: 'Phase 1 (= rules engine + home-business allocation + tax-saving simulation) will start once the trade-name bank account is opened. Phase 2 (= Discord Bot + Claude Vision receipt OCR) follows the stabilization of Phase 1.'
  stack:
    num: "§ 04"
    marginalia: "Stack"
    title: "Technical stack."
    items:
      - "TypeScript + tsx (= no build step)"
      - "freee Accounting API (= OAuth 2.0)"
      - "Anthropic Claude Vision (= Claude 4.x / multimodal)"
      - "discord.js (= Bot intake channel)"
      - "zod (= API response validation)"
  links:
    num: "§ —"
    marginalia: "Links"
    title: "Related links."
    items:
      - label: "Code"
        href: "https://github.com/ChatteLapin/business"
        text: "github.com/ChatteLapin/business"
        note: ""
        external: true
      - label: "Operations doc"
        href: "https://github.com/ChatteLapin/business/blob/main/CLAUDE.md"
        text: "CLAUDE.md"
        note: ""
        external: true
      - label: "Security"
        href: "https://github.com/ChatteLapin/business/blob/main/SECURITY.md"
        text: "SECURITY.md"
        note: ""
        external: true
      - label: "Contact"
        href: "/en#contact"
        text: "Contact section on the front page"
        note: ""
        external: false

products_volt:
  layout:
    title: "volt"
    description: "ChatteLapin's experimental product. A proof-of-concept project for online community operations, combining AI Proxy, a Discord Bot, and structured data management."
  breadcrumb_label: "Products"
  header:
    eyebrow: "Experimental product"
    title: "volt"
    tagline: "A proof-of-concept for AI-assisted community operations."
    meta:
      field_label: "Field"
      field_value: "AI Proxy × Bot operations"
      status_label: "Status"
      status_value: "Live / accumulating insight"
      bridge_label: "Connects to"
      bridge_value: "Precursor to Talent's B2B features"
  purpose:
    num: "§ 01"
    marginalia: "Purpose"
    title: "Project goals."
    paragraph_1: 'volt combines <strong>an AI Proxy, a Discord Bot, and structured data management</strong> into a proof-of-concept project for online community operations. It implements the ChatteLapin mission "Place a quiet hour between technology and the analog" from the perspective of small ties between people in a digital space.'
    paragraph_2: "Today's online communities tend to wear thin under chains of short messages, instant replies, and notifications. volt explores an operating model in which AI organizes, summarizes, and presents information — so members engage deeply only when needed, and otherwise stay quietly connected."
  bridge:
    num: "§ 02"
    marginalia: "Bridge to Talent"
    title: "Connection to the flagship — Talent."
    paragraph: 'volt is not a standalone experiment; it doubles as technical precursor work for the <strong>B2B school features</strong> (= multiplayer classroom mode / community operations) on the long-term roadmap of <a href="/en/products/talent">Talent</a>.'
    relays:
      - from: "Bot operations expertise"
        to: "Reused as the foundation for Talent's teacher dashboard and class operations"
      - from: "AI Proxy"
        to: "A safer design that never exposes LLM API keys to the client"
      - from: "Structured data management"
        to: "Design insight for learning history and progress tracking"
      - from: "PM2 process management"
        to: "A unified operating policy across all ChatteLapin products"
  stack:
    num: "§ 03"
    marginalia: "Stack"
    title: "Technical stack."
    items:
      - "TypeScript + tsx (= TypeScript executed directly, no build step)"
      - "discord.js v14 (= the latest spec, including Components V2)"
      - "External AI API (= Proxy configuration via a Google Cloud Function)"
      - "Structured data store (= Google Sheets API)"
      - "PM2 (= managed under namespace=chattelapin)"
  operation:
    num: "§ 04"
    marginalia: "Operation"
    title: "Operating record and validation."
    paragraph_1: 'The project is currently operated for a specific online game community, providing AI-assisted information delivery, scheduling, and data aggregation. From operating data we accumulate insight into questions such as "when do people ask AI for help?" and "what is the effect of a Bot that simply, quietly exists?"'
    paragraph_2: '※ The operating community is under individual agreement. We refrain from detailing here whether the engagement is public or private.'
  links:
    num: "§ —"
    marginalia: "Links"
    title: "Related links."
    items:
      - label: "repo"
        href: "https://github.com/ChatteLapin/volt"
        text: "github.com/ChatteLapin/volt"
        note: "(= private)"
        external: true
      - label: "Related product"
        href: "/en/products/talent"
        text: "Talent"
        note: "(= the precursor target for B2B school features)"
        external: false
      - label: "Contact"
        href: "/en#contact"
        text: "Contact section on the front page"
        note: ""
        external: false

products_brand:
  layout:
    title: "brand — Brand & Communications foundation"
    description: "A public foundation that consolidates ChatteLapin's logo, favicon, and guidelines along with the official site source and future communications materials (= business cards, leaflets, press releases)."
  breadcrumb_label: "Products"
  header:
    eyebrow: "Public brand"
    title: "brand"
    tagline: "Brand & Communications foundation (= public)."
    meta:
      field_label: "Field"
      field_value: "Brand × Communications"
      status_label: "Status"
      status_value: "Live (= includes this site)"
      access_label: "Access"
      access_value: "public repo"
  position:
    num: "§ 01"
    marginalia: "Position"
    title: "Positioning."
    paragraph_1: 'brand is the <strong>source of truth for ChatteLapin''s outward-facing brand expression</strong>. Alongside design assets such as the logo and favicon, it consolidates the source code of the official site (= this site <a href="/en">chattelapin.orz.cc</a>) and, in time, communications materials such as business cards, leaflets, and press releases — all in a single public repo.'
    paragraph_2: 'It implements the mission "Place a quiet hour between technology and the analog" on the side of brand expression. The same sense of quietness and warmth is consolidated across both screen (= digital) and print (= analog).'
    paragraph_3: 'It is not sold as a product, but by publishing the logo guidelines and the source of the official site, it provides a reference point for coverage, collaboration, and brand citation.'
  assets:
    num: "§ 02"
    marginalia: "Assets"
    title: "Asset composition."
    items:
      - title: "Master logo"
        text: "2048×2048 RGB — the editing source for all derivatives"
      - title: "Logo derivatives"
        text: "64px / 400px / 600px (= transparent, for web embed / og image / business cards, etc.)"
      - title: "favicon"
        text: "16px / 32px / favicon.ico (= browser tab)"
      - title: "Icons"
        text: "PWA 192px / 512px / Apple Touch Icon (= OS integrations)"
      - title: "Guidelines"
        text: "Usage policy / naming conventions / derivative re-generation commands"
      - title: "Official site"
        text: 'This site (= <code>brand/site/</code>) — Astro v5 + Cloudflare Pages'
      - title: "Planned additions"
        text: 'Business cards, leaflets, brochures (<code>brand/print/</code>) / press releases, media kits (<code>brand/pr/</code>)'
        future: true
  operation:
    num: "§ 03"
    marginalia: "Operation"
    title: "Operating policy."
    paragraph: 'The master logo is the source of truth; derivative files are regenerated through commands such as ImageMagick. Each product pulls in assets from the brand repo via <code>cp</code>, minimizing the cost of following brand changes. The official site is deployed directly to Cloudflare Pages from this repo.'
