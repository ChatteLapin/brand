mission:
  num: "§ 01"
  marginalia: "Mission"
  title: "Which bridges we build."
  lede: "The digital has brought convenience; at the same time, it has quietly pushed aside the time to think at one's own pace, the texture of paper, and the small ties between people. Each activity of ChatteLapin is an attempt to set the receding analog values back, within the digital."
  bridge:
    talent:
      num: "01"
      title: "Flagship — Talent"
      text: "Restoring, within a digital game, the time to read as one reads a paper book."
    volt:
      num: "02"
      title: "Experiment — volt"
      text: "A proof-of-concept project to rebind, with AI, the small ties between people in a digital space."
    business:
      num: "03"
      title: "Operations — business"
      text: "Reweaving paper receipts and ledgers, into the digital, through AI."
    brand:
      num: "04"
      title: "Brand — brand"
      text: "An unwavering brand experience across print and screen / the foundation of this official site."

products:
  num: "§ 02"
  marginalia: "Products"
  eyebrow: "Core of the business"
  title: "Flagship product."
  lede: "The product offered to the outside world, carrying the long-term revenue and social value of the business."
  divider_label: "and supporting it"
  subtitle: "Surrounding work that supports the flagship."
  satellite_lede: "Proof-of-concept projects, internal operating infrastructure, and a public brand foundation — together they make the development and long-term operation of the flagship possible."
  cards:
    talent:
      name: "Talent"
      tagline: "A PWA game weaving three axes — global cultures × business simulation × education. As a young merchant traveling the world, run shops in many countries, and along the way, take in cultures, languages, economies, and quiet bonds with people."
      badge: "Flagship"
    volt:
      name: "volt"
      tagline: "A proof-of-concept project for AI-assisted community operations. Also a technical precursor to Talent's B2B school features (= classroom mode / community operation)."
      badge: "Experiment"
    business:
      name: "business"
      tagline: "An AI-driven accounting automation platform built on the freee API and Claude Vision. An internal mechanism designed to minimize the operational hours of running a business, so that time can be concentrated on the flagship."
      badge: "Operating base"
    brand:
      name: "brand"
      tagline: "A public brand and communications foundation that consolidates the logo, guidelines, official site source, and future printed materials. The source of truth for a brand experience that does not waver between print and screen."
      badge: "Public brand"

contact:
  num: "§ 04"
  marginalia: "Contact"
  eyebrow: "Contact"
  title: "Get in touch."
  lede: 'Business inquiries are received via <strong>GitHub Issues</strong>. The button below opens the Issue form directly (a free GitHub account is required; sign-up takes only a few minutes).'
  cta:
    label: "Contact via GitHub Issues"
    hint: "Opens the GitHub.com Issue form in a new tab"
  fallback: 'Inquiries are received on the <a href="https://github.com/ChatteLapin/brand" target="_blank" rel="noopener">brand</a> repo (the public repository that consolidates the source of this site and ChatteLapin''s brand and communications assets). We accept inquiries of any kind, and route them to the appropriate area. An email form will be added in due course.'
