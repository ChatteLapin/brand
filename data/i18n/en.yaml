contact:
  num: "§ 04"
  marginalia: "Contact"
  eyebrow: "Contact"
  title: "Get in touch."
  lede: 'Business inquiries are received via <strong>GitHub Issues</strong>. The button below opens the Issue form directly (a free GitHub account is required; sign-up takes only a few minutes).'
  cta:
    label: "Contact via GitHub Issues"
    hint: "Opens the GitHub.com Issue form in a new tab"
  fallback: 'Inquiries are received on the <a href="https://github.com/ChatteLapin/brand" target="_blank" rel="noopener">brand</a> repo (the public repository that consolidates the source of this site and ChatteLapin''s brand and communications assets). We accept inquiries of any kind, and route them to the appropriate area. An email form will be added in due course.'
