    num: "§ 00"
    label: "Prologue"
  title:
    line1: "Place a quiet hour"
    line2: "between technology"
    line3: "and the analog."
  lede: "What the digital quietly took away — the time to read slowly, the time to think at one's own pace, the texture of paper, the small ties between people — we set it back, within the digital. The mission once carried by our musical theatre company, <em>to restore inner ease</em>, is now reimplemented through digital means. This is the work of ChatteLapin."
