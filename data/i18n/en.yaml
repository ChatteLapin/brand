products_talent:
  layout:
    title: "Talent"
    description: "Talent — a PWA game that weaves global cultures × business simulation × education. A business simulation a child can play alone, and a parent can quietly recommend."
  breadcrumb_label: "Products"
  header:
    title: "Talent"
    tagline: "A business simulation a child can play alone, and a parent can quietly recommend."
    meta:
      field_label: "Field"
      field_value: "Business simulation × Global culture × Education"
      distribution_label: "Distribution"
      distribution_value: "PWA (Cloudflare Access)"
      status_label: "Status"
      status_value: "v0.x initial build in development"
  overview:
    num: "§ 01"
    marginalia: "Overview"
    title: "About the work."
    paragraph_1: '<strong>Talent</strong> is a business simulation game delivered as a PWA (= Progressive Web App). The player opens a small shop in a seaside trading town, finds materials at the morning market, finishes the goods by hand, welcomes guests through the day, and spends a brief moment with the townspeople at night — quietly layering one day upon the next, like leaves of a calendar.'
    paragraph_2: 'What deserves emphasis is that the work is designed so that <strong>playing the game itself becomes a gentle learning experience</strong>. Arithmetic (= the ledger of trade), social studies (= global cultures and geography, and through the series, <strong>encounters with a wide range of vocations</strong>), national language (= reading, writing, and Japanese phrasing), <strong>foreign language</strong> (= a language-switch button anchored at the top-right of the screen, placing the same scene side by side in the mother tongue and a foreign tongue), economics (= the relation between price and demand), food (= ingredients and seasons), and ways of relating to people (= closeness, parting, and letters) — none of these are preached or imposed; all are woven into the rhythm of the daily round.'
    callout:
      label: "Design Principle"
      text: 'There is <strong>no game over</strong> in this work. The day after stock runs out becomes "let''s bake a little more next time"; the day after goods go unsold becomes "what shall we change tomorrow?" — failure is designed to turn directly into <strong>tomorrow''s ingenuity</strong> and the <strong>delight of trying</strong>. The work does not bind the player with pain and despair; it invites them toward the room for ingenuity and the next move.'
  etymology:
    num: "§ 02"
    marginalia: "Etymology"
    title: "About the title."
    paragraph_1: 'In ancient Greece and Rome, "talent" was used as a unit of weight and currency. By way of the New Testament''s Parable of the Talents, the word later spread through medieval European languages to mean "a gift bestowed from above." A unit of economic value, and the possibility a person holds — those two meanings are quietly layered in a single word.'
    paragraph_2: 'The title <strong>Talent</strong> deliberately takes on this duality. Inside the game, the unit of currency the player earns through daily trade is also called <strong>"Talent" (Ŧ)</strong>. To accumulate the books of trade is, at the same time, to <strong>accumulate one''s talent</strong> — by sharing a single word for the title and the currency, the structure of the work, at once business simulation and educational, is quietly carried by a single currency mark.'
    callout:
      label: "Etymology"
      text: '<strong>talent</strong> (Eng.) / <strong>τάλαντον</strong> (Greek) / <strong>talentum</strong> (Lat.) — originally a unit of weight placed on a balance, and from there a measure of weighed precious metal, and in time a unit of currency. The currency mark <strong>Ŧ</strong> (U+0166) is the Latin letter T with a crossbar, also bearing the visual sign of "a T carrying the beam of a balance."'
  principles:
    num: "§ 03"
    marginalia: "Principles"
    title: "Design principles.<br />Do not impose, do not lecture, do not hide."
    lede: 'Talent''s educational design rests on three consistent principles. Learning is woven into the in-game experience, yet any device that would make the player feel "I am studying now" is carefully avoided.'
    items:
      - num: "i"
        title: "Do not impose"
        text: 'No "improving" devices, no textbook-style footnotes. Learning is designed as something one notices later, as an aftereffect.'
      - num: "ii"
        title: "Do not lecture"
        text: 'Explanatory text and excessive tutorialization are avoided. The townspeople of the game world <em>act out</em> the experience.'
      - num: "iii"
        title: "Do not hide"
        text: 'For words and concepts that may be hard for a child to grasp, the meaning is made to come across naturally through context. Furigana (= phonetic ruby annotations) are always provided on first appearance.'
  axes:
    num: "§ 04"
    marginalia: "Three Axes"
    title: "The originality of integrating three axes."
    items:
      - num: "01"
        title: "Business simulation"
        text: "The daily cycle of purchasing, making, pricing, and serving. A natural sense of the ledger."
      - num: "02"
        title: "Global culture"
        text: "Starting with Part I and unfolding through the series, motifs from many nations. The attractive and affirming sides of each culture are depicted with deliberate care. Yet <em>affirming depiction is not the same as blind affirmation</em>. As the series unfolds, the duality of commerce and international relations (= fairness / exploitation / competition / cooperation) is treated with the support of the <strong>scholarly lineage</strong> (= see §05)."
      - num: "03"
        title: "Education"
        text: "A systematized framework of eight domains: national language / foreign language / arithmetic / social studies / economics & commerce / food education / sociality / history & ethics."
    lift_text: 'In the existing game market, works that integrate these three axes simultaneously and at a high level <strong>scarcely exist</strong>. By occupying this empty quarter, Talent offers a new option to children, parents, and educational institutions.'
  curriculum:
    num: "§ 05"
    marginalia: "Curriculum"
    title: "Educational design — three overarching categories across eight domains."
    paragraph: "This work's educational value is organized into <strong>three overarching categories</strong> (= shown below). Using these as the top-level positioning, the <strong>eight domains</strong> (= further below) are systematized as subject-level evidence. The whole serves as an evidence document presentable to educational institutions considering adoption."
    categories:
      - tag: "Foundation"
        title: "Foundational Education"
        text: "National language, arithmetic, history (etymology and origins), foreign language. Old-fashioned turns of phrase with furigana, arithmetic felt through commerce, an always-visible one-click language switch — the basics of school subjects are woven into the game experience in the form of something <strong>noticed later, as a result</strong>."
      - tag: "Practical"
        title: "Social Studies (Management) Education"
        text: "Social studies (geography, culture, vocations), economics & commerce + <strong>a twelve-discipline management curriculum</strong> (= Marketing / Operations & Supply Chain / Accounting / Finance / Management (= Organizational Behavior, Leadership) / Strategy / Economics (+ Behavioral) / Entrepreneurship & Innovation / International Business / Business Analytics & DX / Business Ethics & Sustainability / Negotiation = the MBA core systematized as life-essential literacy). The domain recently spotlighted as 'money education' is reached even into management studies — usually taught only at the university level — and made encounterable in daily play from childhood. This is Talent's distinctive axis of differentiation."
      - tag: "Affective"
        title: "Affective Education (+ Peace Education)"
        text: "Food education (= ingredients, combinations, seasons, origins) / sociality and human relations (= closeness, parting, asynchronous letters) / ethics and character formation (= living with failure, consideration for others) + the cross-cutting theme of '<strong>waiting</strong>' (= concentration, introspection, anticipation, afterglow), and <strong>peace education</strong> brought to fruition as fable in the final chapter. The domain easily lost to IT, smartphones, and two-working-parent households is reclaimed through game experience."
    lift_text: '"<strong>Social Studies (Management)</strong>" does not strictly map onto formal school terminology, but is used here as a convenient label for Talent''s distinctive offering (= a domain in which today''s society, economy, and management are learned as life-essential literacy from childhood). Peace education is positioned as a subordinate strand of Affective Education (+), brought to fruition as <em>fable</em> in the final chapter of the story.'
    table:
      head_area: "Domain"
      head_body: "In-game learning experience"
    rows:
      - area: "National language"
        body: 'Old-fashioned turns of phrase, the noun-ending style, reading comprehension. As a refuge from short-form media, it trains "the muscle to keep reading." Furigana required on first appearance.'
      - area: "Foreign language"
        body: 'A language-switch button anchored at the top-right of the screen places the same scene side by side in the mother tongue and another tongue. The realization that "the same thing can be said in another language" becomes the doorway to language learning.'
      - area: "Arithmetic"
        body: 'Addition, subtraction, multiplication, division, ratios, estimation (= the daily cycle of cost, revenue, profit, and margin). It settles through the experience of being "used in scenes close at hand."'
      - area: "Social studies"
        body: 'Geography, cross-cultural understanding, international exchange. And awareness of the existence of a wide range of vocations and the structure of society (= vocational expansion; see the next section).'
      - area: "Economics & commerce"
        body: 'A sense of price and demand, inventory risk and opportunity loss, cost ratios. An alternative experience for households where it is hard to talk about money.'
      - area: "Food education"
        body: 'Kinds of ingredients, combinations, origins, seasons. "Character formation through food," in line with the spirit of Japan''s Food Education Basic Act (= 2005).'
      - area: "Sociality"
        body: 'The accumulation of closeness, the acceptance of parting, asynchronous communication (= letters). A response to "always-on fatigue."'
      - area: "History & ethics"
        body: 'Etymology, the history of how foods traveled, the rhythm of the calendar. How to live with failure, an attitude that values things, and consideration for others — all acted out by the townspeople.'
    rigor:
      subtitle: "The lineage that underwrites the learning — thinking frameworks, and the thinkers behind the fable of peace."
      intro: "This work's educational design owes much to the knowledge accumulated by thinkers and practitioners, ancient and modern. Players need not be aware of any of the names; the experience arrives simply as the natural rhythm of 'try, observe, adjust,' settling quietly into the daily cycle. Behind it, however, lies a continuous lineage — from quality management to strategic decision-making among the thinking frameworks, and from classical philosophy on commerce and peace to modern economic empirics. We introduce that lineage here, with respect."
      items:
        - tag: "Loop"
          title: "PDCA"
          text: "W. Edwards Deming (= quality management). In Talent, adopted as the spine of <em>steady-state operation and continuous improvement</em> units (= the daily cycle of pricing, inventory, and service)."
        - tag: "Loop"
          title: "OODA"
          text: "John Boyd (= decision theory, military origin). In Talent, adopted for <em>competition and adaptive response</em> units (= responding to rivals and shifting market conditions)."
        - tag: "Loop"
          title: "Build–Measure–Learn"
          text: "Eric Ries (= <em>The Lean Startup</em>, 2011). In Talent, adopted for <em>new-venture and hypothesis-testing</em> units (= new-product development, new locations)."
        - tag: "Loop"
          title: "Design Thinking / DMAIC"
          text: "IDEO lineage / Six Sigma lineage. In Talent, referenced as auxiliary frameworks for product development and process improvement."
        - tag: "Sage"
          title: "Immanuel Kant — <em>Perpetual Peace</em> (1795)"
          text: "Republican constitution + international law + economic exchange (= the 'spirit of commerce') as a trinity for the deterrence of war. One of the philosophical foundations of the final-chapter arc."
        - tag: "Sage"
          title: "Montesquieu — <em>The Spirit of the Laws</em> (1748)"
          text: 'Commerce engenders gentler manners (= the "doux commerce" hypothesis). A foundational theory in dialogue with Talent''s "duality of commerce" staging.'
        - tag: "Sage"
          title: "Norman Angell — <em>The Great Illusion</em> (1909)"
          text: "Deep economic interdependence renders war irrational — yet World War I refuted this prediction. In Talent, this counter-example is itself <em>important</em>: it is the ground for refusing to reduce the causes of war to a single factor."
        - tag: "Sage"
          title: "Doyle / Russett / Oneal — commercial-peace empirics (1990s–2000s)"
          text: "Statistically, two states with high mutual trade dependence are less likely to go to war; combined with democracy and international-organization membership the probability falls further. Modern empirical support for the final-chapter view that commerce is <em>one of the necessary conditions</em>."
        - tag: "Sage"
          title: "Robert Axelrod — <em>The Evolution of Cooperation</em> (1984)"
          text: "In the iterated prisoner's dilemma, agents learn that long-term gain favors cooperation over defection; the superiority of reciprocal strategies (= Tit for Tat) is empirically demonstrated. The theoretical basis for the final chapter's <em>Win-Win deal-design</em> mini-game."
  vocations:
    num: "§ 06"
    marginalia: "Vocations"
    title: "Strengthening social studies through vocational expansion."
    paragraph: 'Conventional business simulations have tended to favor showy occupations — cafés, convenience stores, residential districts. Talent departs from this; through the series, it deliberately takes up <strong>the wide range of vocations that support society</strong>. This is the core differentiating axis through which the work carries the social-studies aim of understanding work, labor, and social structure.'
    figure_alt: "Part 1 Chapter 1 header screen: Aumi Town, Asuka Kingdom (= the player opens as an onigiri shop owner)"
    items:
      - tag: "A"
        title: "Familiar entry points"
        text: "Bakery, cake shop, woodwork studio, gardening, family restaurant. As an extension of the existing business-simulation frame, themes a child can step into easily."
      - tag: "B"
        title: "Traditional vocations short of successors"
        text: "Agriculture, fishery, forestry, traditional crafts. Social challenges particular to Japan, brought into game experience together with their meaning and their beauty."
      - tag: "C"
        title: "Vocations that work through the night"
        text: 'Logistics, security, railway track maintenance, printing. The realization that "society moves even in the hours one does not see."'
      - tag: "D"
        title: "Quiet but essential infrastructure vocations"
        text: 'Electricity, water, gas, postal service, waste collection. Awareness of, and gratitude toward, "the people who hold up the everyday."'
    lift_text: 'Through this expansion, the work aims to increase the <strong>options that come to mind</strong> at the moment of future career choice, and to quietly take apart, through game experience, the oversimplified view that "a showy job is a good job." To preserve continuity of game mechanics, however, the vocations played as <strong>full business simulations</strong> are limited to those with a sourcing → making → selling backbone (= Category A in the main, and parts of B); large-scale industrial and infrastructure vocations are introduced instead as <strong>"vocations to encounter"</strong> — <em>customers, characters, episodes, and background</em> (= the <em>encounter / operate</em> distinction).'
  safety:
    num: "§ 07"
    marginalia: "Safety"
    title: "A design parents can safely hand to their children."
    check_items:
      - "<strong>Zero personal-data collection</strong> — no account registration, local save only (= structural conformance to COPPA / GDPR-K)"
      - "<strong>Zero violence, bloodshed, or cruelty</strong>"
      - "<strong>Zero sexual depiction, no forced romance, no harassment elements</strong>"
      - "<strong>Zero gambling, gacha, or probability-based monetization</strong> — pay-to-win elements are structurally excluded"
      - "<strong>No real-time multiplayer, no chat with strangers</strong> — only asynchronous letters and recipe sharing"
      - "<strong>No game over</strong> — failure is designed to turn into tomorrow's ingenuity"
      - "<strong>National motifs are kept to respectful depiction</strong> — no discriminatory, demeaning, or mocking portrayal. Politics, religion, war, and colonialism are kept outside the scope of the series as a whole"
    subtitle: "Conformance to international standards.<br />Built into the design from day one."
    subtitle_paragraph: "The work is designed to conform, from the very first day of development, with each country's and region's child-protection laws and age-classification systems. Rather than retrofitting, structural integration minimizes the barriers to international rollout and institutional adoption."
    table:
      head_standard: "Standard"
      head_area: "Domain covered"
    standards:
      - name: "COPPA"
        href: "https://en.wikipedia.org/wiki/Children%27s_Online_Privacy_Protection_Act"
        text: "U.S. Children's Online Privacy Protection Act (= regulation on collecting personal information from children under 13)"
      - name: "GDPR-K"
        href: "https://en.wikipedia.org/wiki/General_Data_Protection_Regulation"
        text: "EU General Data Protection Regulation, children's special provisions (= guardian consent for those under 16)"
      - name: "APPI"
        href: "https://www.ppc.go.jp/personalinfo/legal/"
        text: "Japan's Act on the Protection of Personal Information (= Personal Information Protection Commission, official)"
      - name: "IARC All Ages"
        href: "https://www.globalratings.com/"
        text: "International Age Rating Coalition's All Ages classification (= a unified age guide across platforms)"
      - name: "PEGI 3"
        href: "https://pegi.info/page/pegi-age-ratings"
        text: "Pan European Game Information, ages 3 and up (= no violence, sexual content, or scary elements)"
      - name: "ESRB E"
        href: "https://www.esrb.org/ratings-guide/"
        text: "North America's Entertainment Software Rating Board, Everyone (= suitable for all ages)"
  language:
    num: "§ 08"
    marginalia: "Language"
    title: "Foreign-language learning, embedded through language switching."
    paragraph_1: 'In many games, language switching is hidden behind the heavy steps of "settings → language selection → restart," and as a result, many players finish in their first language.'
    paragraph_2: 'Talent <strong>anchors the language-switch button at the top-right of the screen</strong>, so the player can switch JA ↔ EN with a single click while keeping game progress intact. The same meaning in the same scene, placed side by side in the mother tongue and another — for a child, this becomes the doorway to a first contact with a foreign language.'
    figure_alt: "The language-switch button anchored at the top-right of the screen (= JA ↔ EN)"
    table:
      head_scene: "Scene"
      head_ja: "Japanese"
      head_en: "English"
    samples:
      - scene: "Morning purchasing"
        ja: "朝の市場へ"
        en: "To the morning market"
      - scene: "Serving guests"
        ja: "ドアベルが鳴る。 お客さまをお迎えします"
        en: "The doorbell rings. You greet your guest"
      - scene: "Next morning"
        ja: "灯りを消して、 明日に備えましょう"
        en: "Turn off the lamp. Tomorrow is another day"
    paragraph_quiet: "Translation is not the unfiltered output of machine translation; it is adjusted by human hand, with respect for the plainness of each language. The initial build supports two languages — JA and EN — and the structure allows stage-by-stage additions of French, German, and other languages as the series turns to parts themed on each country."
  market:
    num: "§ 09"
    marginalia: "Market"
    title: "Position within the game market.<br />The empty quarter where three axes meet."
    paragraph: 'None of the existing business simulations, educational games, or historical-commerce games <strong>line up the three axes — business simulation × global culture × education — simultaneously and at a high level</strong>. Talent sits within this empty quarter.'
    table:
      head_area: "Area"
      head_titles: "Representative works"
      head_gap: "Missing axes"
    rows:
      - area: "Shop-management simulations"
        titles: "Recettear, etc."
        gap: "No global-culture rollout / no educational design"
      - area: "Medieval commerce games"
        titles: "Patrician / Spice and Wolf, etc."
        gap: "For adults / no consideration for children"
      - area: "Educational creative games"
        titles: "Minecraft Education / Roblox Education"
        gap: "The systematic learning of economics and management is left blank"
      - area: "Agriculture / food-education games"
        titles: "Stardew Valley / Sakuna, etc."
        gap: "No global-culture rollout / not centered on learning"
    lift_text: 'Talent does not directly compete with large-scale educational products such as Minecraft and Roblox; it aims to sit, as <strong>"the option next to Minecraft,"</strong> in the place that carries the systematic learning of economics, management, and global culture.'
  continuity:
    num: "§ 10"
    marginalia: "Continuity"
    title: "Series warp — inheritance across parts."
    paragraph: 'Talent is not a work that concludes with Part I alone; it has a structure in which the world widens through the series. The people met in each chapter, the words taken in, the relationships accumulated — all continue to live in the next part.'
    items:
      - '<strong>The warp of characters</strong> — people met in each chapter return in other parts through letters and reunion. Rather than one-time "passings," the work builds relationships meant to be cherished over the long term.'
      - '<strong>The warp of languages</strong> — JA / EN in Part I; from Part II onward, languages corresponding to the motif country of each part are added in stages, in the natural flow of the story.'
      - '<strong>The warp of vocations</strong> — beginning with the onigiri shop in Part I, each part takes up a new vocation, while maintaining the common grammar of "the basic cycle of trade."'
  roadmap:
    num: "§ 11"
    marginalia: "Roadmap"
    title: "Roadmap."
    table:
      head_version: "Version"
      head_content: "Contents"
      head_time: "Timing"
    rows:
      - version: "v0.x (initial)"
        content: 'Part I, Chapter 1 "The Onigiri Shop''s Morning" / 30-day full playthrough / Save Framework (= carry-over code) / exploratory learning loop'
        time: "In active development"
      - version: "v1.0"
        content: "Epilogue completed, accounts and cloud save sync, store distribution, parental consent flow (= COPPA / GDPR-K)"
        time: "After initial-build evaluation"
      - version: "v1.x"
        content: "B2B educational-institution license / school admin console / additional languages (= French and others)"
        time: "After v1.0"
      - version: "v2.0"
        content: "Chapter 2 = a single Stage A vessel implemented (= one of: cross-cultural trade / tourist town / specialty shop). Linear fixed chapter order has been withdrawn (= ADR-062 revision; skill-stage gates + player vessel selection)"
        time: "Targeted for 2027"
      - version: "Side stories (= expansion via the axis × vessel split)"
        content: "New vessels placed on the same axis (= Sara's perspective / Washigorou's youth / spin-offs). Players need no relearning."
        time: "Continuing on a several-month to one-year cadence"
      - version: "Volume II"
        content: "The axis itself extended one step (= ESG / Sustainability at the center, generational handover). The duality of commerce is brought to the fore."
        time: "Long term"
  distribution:
    num: "§ 12"
    marginalia: "Distribution"
    title: "Distribution platforms."
    items:
      - num: "01"
        title: "Stage 1"
        text: "PWA (= distributed via talent.orz.cc, with home-screen installation supported). No app installation required."
      - num: "02"
        title: "Stage 2"
        text: "itch.io / Steam (= browser-game category) / Epic Games Store."
      - num: "03"
        title: "Stage 3"
        text: "App Store / Google Play (= wrapped with Capacitor or similar)."
      - num: "B2B"
        title: "For educational institutions"
        text: "Offered through a separate B2B channel."
  links:
    num: "§ —"
    marginalia: "Links"
    title: "Related links."
