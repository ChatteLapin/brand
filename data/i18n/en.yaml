  num: "§ 02"
  marginalia: "Products"
  eyebrow: "Core of the business"
  title: "Flagship product."
  lede: "The product offered to the outside world, carrying the long-term revenue and social value of the business."
  divider_label: "and supporting it"
  subtitle: "Surrounding work that supports the flagship."
  satellite_lede: "Proof-of-concept projects, internal operating infrastructure, and a public brand foundation — together they make the development and long-term operation of the flagship possible."
  cards:
