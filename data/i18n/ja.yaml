mission:
  num: "§ 01"
  marginalia: "Mission"
  title: "どの橋をかけているか。"
  lede: "デジタルは便利を運んできましたが、 同時に「ゆっくり考える時間」 「紙のような手触り」 「人と人の小さな縁」 を、 そっと脇に追いやってきました。 ChatteLapin の各活動は、 失われがちなアナログの価値を、 デジタルの中にもう一度置きなおす試みです。"
  bridge:
    talent:
      num: "01"
      title: "主力 — Talent"
      text: "デジタルゲームの中に、 紙の本のような読書の時間を取り戻す。"
    volt:
      num: "02"
      title: "実験 — volt"
      text: "デジタル空間に、 人と人の縁を AI で結びなおす実証実験。"
    business:
      num: "03"
      title: "運営 — business"
      text: "紙のレシートと帳簿を、 AI でデジタルに編みなおす。"
    brand:
      num: "04"
      title: "広報 — brand"
      text: "印刷物と画面の双方で揺るがないブランド体験 / 公式サイトの土台。"

about:
  num: "§ 03"
  marginalia: "About"
  eyebrow: "事業概要"
  title: 'テクノロジーで実現する、<br />静けさのある営み。'
  mission_frame:
    label: "Mission Statement"
    text: 'テクノロジーとアナログの間に、 <br />静かな時間を置く。'
    body_1: "デジタルは便利を運んできた一方で、 ゆっくり考える時間・紙のような手触り・人と人の小さな縁を、 そっと脇に追いやってきました。 ChatteLapin の各活動は、 失われがちなアナログの価値を、 デジタルの中にもう一度置きなおす試みです。"
    body_2: '単に古き良きを保存するのではなく、 <strong>テクノロジーで運営しなければ実現できない静けさ</strong> を、 設計の段階から組み込みます。 すべての活動 — 主力プロダクトの開発も、 それを支える事業基盤の整備も — がこの基準のうえに立ちます。'
  overview:
    subtitle: "事業の概要。"
    paragraph_1: 'ChatteLapin の業種は <strong>ソフトウェア開発業</strong> です。 ソフトウェアという一つの道具で、 <strong>文化・教育・コミュニティ運営</strong> の領域に静かな時間を置く — それが事業の中核です。'
    paragraph_2: '主力は新規ゲーム事業『<a href="/products/talent">Talent</a>』 (= 国際文化 × 経営シミュレーション × 教育の PWA ゲーム)。 これを軸として、 周辺の活動 (= AI 活用コミュニティ運営の実証実験、 事業運営を支える AI 駆動 会計自動化基盤、 ブランド・広報資産を一元化する公開基盤) を内製で並行展開しています。'
    paragraph_3: 'いずれも独立した「製品ライン」 ではなく、 ひとつのミッションから派生した手段の集合として位置づけています。'
  legacy:
    subtitle: "前史 — 音楽劇団シャラパンからの継承。"
    intro: '事業者は過去に「音楽劇団シャラパン」 を立ち上げ、 主宰として「空想音楽劇 真昼の銀河」 等の公演を行ってきました。 当時の主宰メッセージには以下の理念が掲げられていました:'
    quote_text: "経済的なゆとりだけでなく、 精神的なゆとりまでもが社会から失われがちな時代に — 観る人の心にゆとりが生まれ、 自身と隣の人々の心の豊かさを取り戻すこと。 質と量の高いステージを提供して社会に貢献すること。"
    quote_attribution: "音楽劇団シャラパン 主宰"
    inheritance: '音楽劇団シャラパンの理念は、 メディアを変えて現在も継承しています。 演劇というアナログメディアで実現してきた <strong>「心のゆとり」</strong> を、 デジタル時代の手法 (= ゲーム / AI / コミュニティ運営) で再実装する — それが現在の ChatteLapin の活動です。 『シャラパン』 の名を継続しているのも、 この理念の連続性を象徴しています。'
  profile:
    subtitle: "事業者プロフィール。"
    intro: '1984 年 (= 昭和 59 年) 生まれ。 就職氷河期末期に社会に出て、 続く <strong>ゆとり世代</strong> を一歩前から見つめてきた世代です。 世間で「悪名」 のように扱われた『ゆとり』 という言葉の用法とは別に、 <strong>本当の意味でのゆとり</strong> — 経済の余裕だけでなく、 時間と精神の余白 — を意識し続けてきました。 ChatteLapin のミッション「テクノロジーとアナログの間に、 静かな時間を置く」 は、 個人的な実感とも地続きの取り組みです。'
    bio:
      - "米国アリゾナ大学 Eller 経営学部卒業 (= 情報システム経営学・起業学・国際経営学 三重専攻)"
      - "過去に Web ベンチャーを設立"
      - "音楽劇団シャラパン主宰として「空想音楽劇 真昼の銀河」 等の舞台公演を企画・制作"
      - "並行して芸能・舞台・モデル業の活動経験 (= ダンス / 2.5 次元舞台プロデュース 等)"
      - "現職: 東京を拠点とする FA 機器メーカーで IT エンジニア・経営企画 (= 正社員、 副業公認)"
      - "2026-05-19 シャラパン (ChatteLapin) を個人事業として開業"
    lift: '<strong>国際経営学の学術背景</strong>・ <strong>20 年超の IT エンジニアと経営企画の実装力</strong>・ <strong>音楽劇団主宰として培った文化事業の現場経験</strong> — この 3 つが交差する立場から、 単なる技術プロダクトではなく <strong>文化・教育・経営の交差点に位置する作品</strong> を生み出すことを事業の中核に据えています。'
  info:
    subtitle: "基本情報。"
    labels:
      name: "事業者名"
      founded: "開業日"
      form: "事業形態"
      industry: "業種"
      tax_office: "管轄税務署"
      github_org: "GitHub Org"

