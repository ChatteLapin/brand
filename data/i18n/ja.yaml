  colophon_text: '本書は <strong>シャラパン (ChatteLapin)</strong> の公式サイトです。 <br /> 2026 年 5 月、 熱海税務署管轄の個人事業として開業。 <br /> ソフトウェア開発業として、 青色申告 65 万円控除のもとに、 <br /> Astro と Tailwind を用い、 静かに組版されました。'
