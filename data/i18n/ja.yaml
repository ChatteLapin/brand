  num: "§ 02"
  marginalia: "Products"
  eyebrow: "事業の中核"
  title: "主力プロダクト。"
  lede: "外部に提供する、 事業の長期的な収益と社会的価値の軸を担うプロダクト。"
  divider_label: "そして、 これを支える"
  subtitle: "主力を支える周辺の取り組み。"
