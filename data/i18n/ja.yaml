    items:
      - '<strong>キャラの縦糸</strong> — 各章で出会う人物が、 別の篇でも文通や再会の形で再登場。 一度きりの「すれ違い」 ではなく、 長く愛される関係を構築。'
      - '<strong>言語の縦糸</strong> — 第 1 篇では JA / EN、 第 2 篇以降は各篇のモチーフ国に対応する言語が、 物語の自然な流れで段階追加。'
      - '<strong>業種の縦糸</strong> — 第 1 篇のパン屋から始まり、 篇ごとに新業種を扱いつつ、 「商売の基本サイクル」 という共通文法は維持。'
