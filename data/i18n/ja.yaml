mission:
  num: "§ 01"
  marginalia: "Mission"
  title: "どの橋をかけているか。"
  lede: "デジタルは便利を運んできましたが、 同時に「ゆっくり考える時間」 「紙のような手触り」 「人と人の小さな縁」 を、 そっと脇に追いやってきました。 ChatteLapin の各活動は、 失われがちなアナログの価値を、 デジタルの中にもう一度置きなおす試みです。"
  bridge:
    talent:
      num: "01"
      title: "主力 — Talent"
      text: "デジタルゲームの中に、 紙の本のような読書の時間を取り戻す。"
    volt:
      num: "02"
      title: "実験 — volt"
      text: "デジタル空間に、 人と人の縁を AI で結びなおす実証実験。"
    business:
      num: "03"
      title: "運営 — business"
      text: "紙のレシートと帳簿を、 AI でデジタルに編みなおす。"
    brand:
      num: "04"
      title: "広報 — brand"
      text: "印刷物と画面の双方で揺るがないブランド体験 / 公式サイトの土台。"

products:
  num: "§ 02"
  marginalia: "Products"
  eyebrow: "事業の中核"
  title: "主力プロダクト。"
  lede: "外部に提供する、 事業の長期的な収益と社会的価値の軸を担うプロダクト。"
  divider_label: "そして、 これを支える"
  subtitle: "主力を支える周辺の取り組み。"
  satellite_lede: "主力プロダクトの開発と長期運営を可能にするための、 実証実験プロジェクト・内部運営基盤・公開ブランド広報基盤。"
  cards:
    talent:
      name: "Talent"
      tagline: "国際文化 × 経営シミュレーション × 教育 の 3 軸を統合する PWA ゲーム。 世界を旅する若き商人として、 各国の店を切り盛りしながら、 文化・言葉・経済・人との縁を、 いつの間にか身につけていく。"
      badge: "主力"
    volt:
      name: "volt"
      tagline: "AI 活用 コミュニティ運営の実証実験。 talent の B2B 教育機関向け機能 (= 教室モード / コミュニティ運営) の前段技術検証を兼ねます。"
      badge: "実験"
    business:
      name: "business"
      tagline: "freee API + Claude Vision による AI 駆動 会計自動化基盤。 事業運営の実務時間を最小化し、 主力プロダクト開発に時間を集中投下するための内部仕組み。"
      badge: "運営基盤"
    brand:
      name: "brand"
      tagline: "ロゴ・ガイドライン・公式サイトのソース・将来の広報物を集約する公開ブランド・広報資産基盤。 印刷物と画面の双方で揺らがないブランド体験の source of truth。"
      badge: "公開ブランド・広報"

contact:
  num: "§ 04"
  marginalia: "Contact"
  eyebrow: "お問合せ"
  title: "声をかけてください。"
  lede: '業務関連のご連絡は <strong>GitHub Issues</strong> でお受けしています。 下のボタンから Issue 作成画面が直接開きます (= 入力には GitHub アカウントが必要です。 無料、 数分で作成可能)。'
  cta:
    label: "GitHub Issues でお問合せ"
    hint: "新規タブで GitHub.com の Issue 作成画面が開きます"
  fallback: 'お問合せは <a href="https://github.com/ChatteLapin/brand" target="_blank" rel="noopener">brand</a> repo (= 本サイトのソースとブランド・広報資産を集約する公開 repo) の Issues でお受けします。 ご用件に関わらずお受けし、 適切な担当領域へ振り分けます。 メールフォームは順次整備します。'
