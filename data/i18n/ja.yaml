      badge: "公開ブランド・広報"

products_business:
  layout:
    title: "business — AI 会計自動化"
    description: "freee API + Claude Vision による会計自動化基盤。 紙のレシートと帳簿を AI でデジタルに編みなおす ChatteLapin 内部運用基盤。"
  breadcrumb_label: "プロダクト"
  header:
    eyebrow: "運営基盤"
    title: "business"
    tagline: "AI 駆動 会計自動化 — 事業運営基盤。"
    meta:
      field_label: "分野"
      field_value: "freee × Claude Vision"
      status_label: "状態"
      status_value: "Phase 0 完了 (2026-05-21)"
      policy_label: "方針"
      policy_value: "OSS 化前提で開発進行"
  position:
    num: "§ 01"
    marginalia: "Position"
    title: "位置づけ。"
    paragraph_1: 'business は、 ChatteLapin の <strong>事業運営基盤</strong> です。 商品として外販はせず、 事業運営の実務時間を最小化するための仕組みです。 ミッション「テクノロジーとアナログの間に、 静かな時間を置く」 を、 会計実務という最も「手間と時間を奪う領域」 で実装しています。'
    paragraph_2: '個人事業を選んだ動機自体が「会計のかなりの部分を AI で自動化できそうだから」 でした。 自動化基盤を内製することで、 事業者本人の時間をプロダクト開発・創造活動に振り向けられる構造を作ります。'
    paragraph_3: '将来的なオープンソース公開を視野に入れ、 同じ立場の個人事業者・開発者の参考となる実装記録として整備していきます。'
  pipeline:
    num: "§ 02"
    marginalia: "Pipeline"
    title: "3 層パイプライン。"
    layers:
      - num: "01"
        title: "銀行 / カードの自動取り込み"
        text: "屋号口座と各種カードからの取引を freee 自動同期で取り込み、 自動仕訳ルールエンジンが摘要 → 勘定科目をマッピング。 信頼度しきい値で「自動確定」 と「レビュー待ち」 を分岐します。"
      - num: "02"
        title: "紙のレシートを AI で編みなおす"
        text: "スマートフォンで撮影した紙のレシートを Discord 経由で受信 → Claude Vision (= マルチモーダル LLM) で OCR + 勘定科目推論を一発実行 → freee API で仕訳登録 + 画像添付 (= 電子帳簿保存法対応)。 アナログな紙の確かさを、 デジタルの帳簿に橋渡しします。"
      - num: "03"
        title: "月次自動チェック / レポート"
        text: "残高合致チェック、 異常検知、 月次収支 PDF レポートの自動生成と通知。 節税スキーム適用シミュレーションも統合し、 確定申告期の集計コストを最小化します。"
  progress:
    num: "§ 03"
    marginalia: "Progress"
    title: "開発状況。"
    paragraph_1: '<strong>2026-05-21 に Phase 0 骨格完了</strong>。 freee 開発者ポータルでアプリ登録 / OAuth 2.0 認可フロー実装 / 取引取得 API 接続動作確認まで到達済です。'
    paragraph_2: 'Phase 1 (= 自動仕訳ルールエンジン + 家事按分 + 節税シミュレーション) は屋号口座開設完了後に着手予定。 Phase 2 (= Discord Bot + Claude Vision レシート OCR) は Phase 1 安定後。'
  stack:
    num: "§ 04"
    marginalia: "Stack"
    title: "技術スタック。"
    items:
      - "TypeScript + tsx (= ビルド不要)"
      - "freee 会計 API (= OAuth 2.0)"
      - "Anthropic Claude Vision (= Claude 4.x / マルチモーダル)"
      - "discord.js (= Bot 受付チャネル)"
      - "zod (= API レスポンス validation)"
  links:
    num: "§ —"
    marginalia: "Links"
    title: "関連リンク。"
    items:
      - label: "コード"
        href: "https://github.com/ChatteLapin/business"
        text: "github.com/ChatteLapin/business"
        note: ""
        external: true
      - label: "運用ドキュメント"
        href: "https://github.com/ChatteLapin/business/blob/main/CLAUDE.md"
        text: "CLAUDE.md"
        note: ""
        external: true
      - label: "セキュリティ運用"
        href: "https://github.com/ChatteLapin/business/blob/main/SECURITY.md"
        text: "SECURITY.md"
        note: ""
        external: true
      - label: "お問合せ"
        href: "/#contact"
        text: "トップページのお問合せセクション"
        note: ""
        external: false

products_volt:
  layout:
    title: "volt"
    description: "ChatteLapin の実験プロダクト。 AI Proxy + Discord Bot + 構造化データ管理によるオンラインコミュニティ運営の実証実験プロジェクト。"
  breadcrumb_label: "プロダクト"
  header:
    eyebrow: "実験プロダクト"
    title: "volt"
    tagline: "AI 活用 コミュニティ運営の実証実験。"
    meta:
      field_label: "分野"
      field_value: "AI Proxy × Bot 運用"
      status_label: "状態"
      status_value: "稼働中 / 知見蓄積"
      bridge_label: "接続先"
      bridge_value: "Talent B2B 機能の前段検証"
  purpose:
    num: "§ 01"
    marginalia: "Purpose"
    title: "プロジェクトの目的。"
    paragraph_1: 'volt は <strong>AI Proxy + Discord Bot + 構造化データ管理</strong> を組み合わせた、 オンラインコミュニティ運営の実証実験プロジェクトです。 ChatteLapin のミッション「テクノロジーとアナログの間に、 静かな時間を置く」 を、 デジタル空間の人と人の小さな縁という観点で実装しています。'
    paragraph_2: '現代のオンラインコミュニティは、 短文・即時応答・通知の連鎖で疲弊しがちです。 volt は、 AI を介して情報を整理・要約・提示することで、 メンバーが必要なときだけ深く関わり、 普段は穏やかに繋がれる運営モデルを検証しています。'
  bridge:
    num: "§ 02"
    marginalia: "Bridge to Talent"
    title: "主力プロダクト『Talent』 への接続。"
    paragraph: 'volt は単独で完結する実験ではなく、 主力プロダクト <a href="/products/talent">Talent</a> の長期ロードマップにある <strong>B2B 教育機関向け機能</strong> (= マルチプレイヤー教室モード / コミュニティ運営機能) の前段技術検証を兼ねています。'
    relays:
      - from: "Bot 運用ノウハウ"
        to: "Talent の教師ダッシュボード / クラス運営の基盤として転用"
      - from: "AI Proxy"
        to: "LLM API キーをクライアントに露出させない安全設計"
      - from: "構造化データ管理"
        to: "学習履歴・進捗トラッキングの設計知見"
      - from: "PM2 プロセス管理"
        to: "ChatteLapin 全プロダクトの統一運用方針"
  stack:
    num: "§ 03"
    marginalia: "Stack"
    title: "技術スタック。"
    items:
      - "TypeScript + tsx (= ビルド不要の TS 直接実行)"
      - "discord.js v14 (= Components V2 含む最新仕様)"
      - "外部 AI API (= Google Cloud Function 経由の Proxy 構成)"
      - "構造化データストア (= Google Sheets API)"
      - "PM2 (= namespace=chattelapin で統一管理)"
  operation:
    num: "§ 04"
    marginalia: "Operation"
    title: "運用実績と検証。"
    paragraph_1: '本プロジェクトは特定のオンラインゲームコミュニティを対象に運用中で、 メンバーへの情報提供・予定調整・データ集計の AI 支援を実装しています。 運用データから「どのタイミングで人は AI 支援を求めるか」 「Bot が静かに在ることの効果」 等の知見を蓄積しています。'
    paragraph_2: '※ 運用対象コミュニティは個別契約。 公開・非公開を含め本ページでの詳細記載は控えます。'
  links:
    num: "§ —"
    marginalia: "Links"
    title: "関連リンク。"
    items:
      - label: "repo"
        href: "https://github.com/ChatteLapin/volt"
        text: "github.com/ChatteLapin/volt"
        note: "(= private)"
        external: true
      - label: "関連プロダクト"
        href: "/products/talent"
        text: "Talent"
        note: "(= B2B 教育機関向け機能の前段検証先)"
        external: false
      - label: "お問合せ"
        href: "/#contact"
        text: "トップページのお問合せセクション"
        note: ""
        external: false

