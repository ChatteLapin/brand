# ChatteLapin 事業者基本情報 (master)
#
# brand site (= chattelapin.orz.cc) と銀行提出 PDF / 教育機関営業 PDF / 投資家説明 PDF 等の
# 派生文書すべてが本ファイルを source of truth として参照する。
#
# 本ファイルは brand repo (= public) に配置するので、 ここに書く値はすべて
# 「公開可能」 とみなす。 非公開数値 (= 売上想定 / 経費構造 / 営業 pipeline 等) は
# internal/strategy/master/ に分離する。
#
# 多言語対応: 翻訳が必要な値は { ja, en } のネストで保持。 言語不問の固有値
# (= ブランド名 / 日付 / 数値 / URL) は scalar 維持。
#
# 更新時の影響範囲:
#   - brand/site/src/pages/index.astro (= ja TOP § 04 基本情報)
#   - brand/site/src/pages/en/index.astro (= en TOP § 04 Basic Info)
#   - internal/strategy/templates/*.md.j2 (= 銀行 / 教育機関 / 投資家 PDF テンプレ)

